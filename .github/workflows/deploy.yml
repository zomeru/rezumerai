name: Deploy Worker to OCI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-worker
  OCI_HOST: ${{ secrets.OCI_WORKER_HOST }}
  SSH_USER: ubuntu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha,prefix=
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: apps/web/Dockerfile.worker
        platforms: linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to OCI VM via SSH
      env:
        GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GHCR_USER: ${{ github.actor }}
        FULL_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        DB_URL: ${{ secrets.DATABASE_URL }}
        OR_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ env.OCI_HOST }}
        username: ${{ env.SSH_USER }}
        key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        port: 22
        envs: GHCR_TOKEN,GHCR_USER,FULL_IMAGE,DB_URL,OR_KEY
        script: |
          set -e

          echo "=== Deploying Rezumerai Worker ==="
          cd /opt/rezumerai

          echo "Logging into GHCR..."
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          echo "Pulling latest image..."
          docker pull "$FULL_IMAGE"

          echo "Stopping existing container..."
          docker stop rezumerai-worker 2>/dev/null || true

          echo "Removing old container..."
          docker rm rezumerai-worker 2>/dev/null || true

          echo "Starting new container..."
          docker run -d \
            --name rezumerai-worker \
            --restart unless-stopped \
            --env NODE_ENV=production \
            --env DATABASE_URL="$DB_URL" \
            --env OPENROUTER_API_KEY="$OR_KEY" \
            "$FULL_IMAGE" \
            bun run worker:all

          echo "=== Deployment Complete ==="
          echo ""
          echo "Container status:"
          docker ps -a --filter name=rezumerai-worker --format "table {{.Names}}\t{{.Status}}"

    - name: Verify deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ env.OCI_HOST }}
        username: ${{ env.SSH_USER }}
        key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        port: 22
        script: |
          echo "Verifying worker container..."
          if docker ps --format '{{.Names}}' | grep -q "^rezumerai-worker$"; then
            echo "✓ Worker container is running"
            docker logs rezumerai-worker --tail 20
            exit 0
          else
            echo "✗ Worker container is NOT running"
            docker ps -a --filter name=rezumerai-worker
            exit 1
          fi
