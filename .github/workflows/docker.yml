name: Docker Build
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Build Web Image
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          target: web
          load: true
          tags: rezumerai-web:test
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify web image exists
        run: docker images rezumerai-web:test

  build-worker:
    name: Build Worker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile.worker
          load: true
          tags: rezumerai-worker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify worker image exists
        run: docker images rezumerai-worker:test
