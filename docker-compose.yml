services:
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      target: web
      args:
        # Only true build-time public variables go here.
        # Runtime secrets are supplied at container start via env_file below.
        # Default to empty string so `docker compose ps/logs` don't warn when
        # NEXT_PUBLIC_SITE_URL is not exported in the shell.
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - app_network
    healthcheck:
      # /api is the Elysia root and returns 200 without requiring DB access.
      # /api/health queries the database (readiness probe) — use a separate
      # readiness check at the load-balancer level, not here.
      test: ["CMD", "curl", "-f", "http://localhost:3000/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      target: worker
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      JOB_QUEUE_ENABLED: "true"
      JOB_QUEUE_WORKER_COUNT: "1"
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "pgrep", "-x", "bun"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  app_network:
    driver: bridge
