  #   secrets:
  #     # Runtime secrets (available when container runs)
  #     - database_url
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     database:
  #       condition: service_healthy
  #   environment:
  #     NODE_ENV: production
  #   networks:
  #     - app_network

volumes:
  postgres_data:
  redis_data:

networks:
  app_network:
    driver: bridge

secrets:
  database_url:
    environment: DATABASE_URL
  better_auth_secret:
    environment: BETTER_AUTH_SECRET
  next_public_site_url:
    environment: NEXT_PUBLIC_SITE_URL
  better_auth_url:
    environment: BETTER_AUTH_URL
  better_auth_github_client_id:
    environment: BETTER_AUTH_GITHUB_CLIENT_ID
  better_auth_github_client_secret:
    environment: BETTER_AUTH_GITHUB_CLIENT_SECRET