services:
  # PostgreSQL Database
  # database:
  #   image: postgres:18-alpine
  #   secrets:
  #     - postgres_db
  #     - postgres_user
  #     - postgres_password
  #   environment:
  #     POSTGRES_DB_FILE: /run/secrets/postgres_db
  #     POSTGRES_USER_FILE: /run/secrets/postgres_user
  #     POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/postgres_user) -d $$(cat /run/secrets/postgres_db)"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - app_network

  # Web Application (Next.js + Elysia API)
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      secrets:
        # Build-time secrets (for Next.js build)
        - next_public_site_url
        - better_auth_secret
        - better_auth_url
        - better_auth_github_client_id
        - better_auth_github_client_secret
    restart: unless-stopped
    env_file:
      - .env.local  # For non-sensitive runtime vars (NODE_ENV, etc.)
    secrets:
      # Runtime secrets (available when container runs)
      - database_url
      - direct_url
      - better_auth_secret
      - better_auth_url
      - better_auth_github_client_id
      - better_auth_github_client_secret
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Web process handles API requests only (no background jobs)
      JOB_QUEUE_ENABLED: "true"
    networks:
      - app_network
    depends_on:
      condition: service_healthy
      worker:
        # Web depends on worker being ready to accept jobs
        required: false

  # Background Job Worker (pg-boss workers)
  worker:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      secrets:
        - better_auth_secret
        - better_auth_url
        - better_auth_github_client_id
        - better_auth_github_client_secret
    restart: unless-stopped
    env_file:
      - .env.local
    secrets:
      - database_url
      - direct_url
      - better_auth_secret
      - better_auth_url
      - better_auth_github_client_id
      - better_auth_github_client_secret
      - openrouter_api_key
    environment:
      NODE_ENV: production
      # Worker process handles background jobs only
      JOB_QUEUE_ENABLED: "true"
      JOB_QUEUE_WORKER_COUNT: "1"
    command: ["bun", "run", "worker"]
    networks:
      - app_network
    healthcheck:
      # Simple health check - worker logs indicate it's running
      test: ["CMD-SHELL", "pgrep -f 'bun.*worker' || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Resource limits for worker
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge

secrets:
  database_url:
    environment: DATABASE_URL
  direct_url:
    environment: DIRECT_URL
  better_auth_secret:
    environment: BETTER_AUTH_SECRET
  next_public_site_url:
    environment: NEXT_PUBLIC_SITE_URL
  better_auth_url:
    environment: BETTER_AUTH_URL
  better_auth_github_client_id:
    environment: BETTER_AUTH_GITHUB_CLIENT_ID
  better_auth_github_client_secret:
    environment: BETTER_AUTH_GITHUB_CLIENT_SECRET
  openrouter_api_key:
    environment: OPENROUTER_API_KEY