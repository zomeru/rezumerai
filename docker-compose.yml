  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/postgres_user) -d $$(cat /run/secrets/postgres_db)"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - app_network

  # Redis (for caching)
  redis:
    image: redis:8.6.1
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app_network

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      secrets:
        # Build-time secrets (for Next.js build)
        - next_public_site_url
        - better_auth_secret
        - better_auth_url
        - better_auth_github_client_id
        - better_auth_github_client_secret
    restart: unless-stopped
    env_file:
      - .env.local  # For non-sensitive runtime vars (NODE_ENV, etc.)
    secrets:
      # Runtime secrets (available when container runs)
      - database_url
      - better_auth_secret
      - better_auth_url
      - better_auth_github_client_id
      - better_auth_github_client_secret
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
    networks:
      - app_network

